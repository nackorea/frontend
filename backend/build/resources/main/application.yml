server:
  port: 3030

spring:
  datasource:
    url: jdbc:mysql://localhost:13306/nac_korea?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  secret: nac-korea-secret-key-must-be-at-least-256bits-long-for-hs256
  expiration: 86400000

logging:
  level:
    com.nackorea: DEBUG
